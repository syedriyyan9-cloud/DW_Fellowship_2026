<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
</head>
<style>
    *
    {
        margin: 0;
        padding: 0;
    }
    body
    {
        background-color: black;
        color: white;
    }
    h2
    {
        text-align: center;
        padding-top: 2rem;
    }
    input
    {
        margin-left: 40%;
        margin-top: 5%;
    }
    div
    {
        margin-left: 40%;
        width: 20%;
        border-style: solid;
        border-width: 1%;
        border-color: greenyellow;
    }
    p
    {
        padding-top: 1rem;
        padding-bottom: 0.5rem
    }
</style>
<body>
    <h2>Use only characters and numbers, Do not use special characters or symbols</h2>
    <input class="input" type="text" placeholder="Add a task">
    <button class="addtask">Add Task</button>
</body>
<script src="script.js"></script>
</html>
