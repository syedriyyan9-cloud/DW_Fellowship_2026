<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
</head>
<style>
    *
    {
        margin: 0;
        padding: 0;
    }
    body
    {
        background-color: black;
        color: white;
    }
    input
    {
        margin-left: 40%;
        margin-top: 5%;
    }
    div
    {
        /* margin-left: 40%; */
        width: 20%;
        border-style: solid;
        /* border-width: 2px; */
        border-color: rgb(143, 144, 142);
    }
    p
    {
        padding-top: 1rem;
        padding-bottom: 0.5rem
    }
    .tasks
    {
        margin-left: 1%;
        width: 95%;
        height: 75%;
        display: flex;
        flex-direction: row;
        justify-content: start;
        flex-wrap: wrap;
        border-style: solid;
        border-width: 1px;
        border-color: rgb(255, 255, 255);
        padding: 1rem;
        gap: 1rem;
    }
</style>
<body>
    <input class="input" type="text" placeholder="Add a task">
    <button class="addtask">Add Task</button>
    <div class="tasks">

    </div>
</body>
<script src="script.js"></script>
</html>
